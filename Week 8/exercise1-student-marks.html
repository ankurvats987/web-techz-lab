<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 1 - Student Marks</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Arial, sans-serif;
        background: linear-gradient(135deg, #eaf2ff, #f6f9ff);
        color: #1f2937;
      }

      .container {
        max-width: 760px;
        margin: 2rem auto;
        padding: 1.5rem;
      }

      .card {
        background: #ffffff;
        border: 1px solid #dbe5ff;
        border-radius: 16px;
        padding: 1.25rem;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin-top: 0;
      }

      form {
        display: grid;
        gap: 0.9rem;
        margin-top: 1rem;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.75rem;
      }

      label {
        display: block;
        font-weight: 600;
        margin-bottom: 0.35rem;
      }

      input {
        width: 100%;
        border: 1px solid #c7d2fe;
        border-radius: 10px;
        padding: 0.65rem;
        font-size: 0.95rem;
      }

      button {
        background: #2563eb;
        border: none;
        border-radius: 10px;
        color: white;
        padding: 0.7rem 1rem;
        font-size: 0.95rem;
        cursor: pointer;
        width: fit-content;
      }

      .result {
        margin-top: 1rem;
        background: #eff6ff;
        border: 1px solid #bfdbfe;
        border-radius: 12px;
        padding: 1rem;
        display: none;
      }

      .result p {
        margin: 0.35rem 0;
      }

      @media (max-width: 640px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>Exercise 1: Student Marks Calculator</h1>
        <p>Enter student details to calculate total and average marks.</p>

        <form id="marksForm">
          <div>
            <label for="studentName">Student Name</label>
            <input id="studentName" type="text" value="Arun" required />
          </div>

          <div class="grid">
            <div>
              <label for="mark1">Mark 1</label>
              <input
                id="mark1"
                type="number"
                min="0"
                max="100"
                value="85"
                required
              />
            </div>
            <div>
              <label for="mark2">Mark 2</label>
              <input
                id="mark2"
                type="number"
                min="0"
                max="100"
                value="90"
                required
              />
            </div>
            <div>
              <label for="mark3">Mark 3</label>
              <input
                id="mark3"
                type="number"
                min="0"
                max="100"
                value="88"
                required
              />
            </div>
          </div>

          <button type="submit">Calculate</button>
        </form>

        <div id="result" class="result"></div>
      </section>
    </main>

    <script src="exercise1-student-marks.js"></script>
    <script>
      const marksForm = document.getElementById("marksForm");
      const result = document.getElementById("result");

      const renderReport = (report) => {
        result.style.display = "block";
        result.innerHTML = `
          <p><strong>Student Name:</strong> ${report.studentName}</p>
          <p><strong>Total Marks:</strong> ${report.totalMarks}</p>
          <p><strong>Average Marks:</strong> ${report.formattedAverage}</p>
        `;
      };

      marksForm.addEventListener("submit", (event) => {
        event.preventDefault();

        const studentName = document.getElementById("studentName").value.trim();
        const mark1 = Number(document.getElementById("mark1").value);
        const mark2 = Number(document.getElementById("mark2").value);
        const mark3 = Number(document.getElementById("mark3").value);

        if (!studentName) {
          alert("Please enter a student name.");
          return;
        }

        const report = getStudentMarksReport(studentName, mark1, mark2, mark3);
        renderReport(report);
      });
    </script>
  </body>
</html>
