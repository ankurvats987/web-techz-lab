<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Online Book Finder</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f0f2f5;
        padding: 30px;
      }
      h1 {
        text-align: center;
        margin-bottom: 24px;
        color: #333;
      }
      .container {
        max-width: 900px;
        margin: 0 auto;
      }

      /* Controls */
      .controls {
        background: #fff;
        border-radius: 10px;
        padding: 22px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        margin-bottom: 24px;
      }
      .controls h2 {
        margin-bottom: 14px;
        color: #444;
      }
      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 12px;
        align-items: center;
      }
      .row input,
      .row select {
        padding: 10px 14px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
        min-width: 180px;
      }
      .row input {
        flex: 1;
      }
      .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        color: #fff;
        transition: background 0.2s;
      }
      .btn-primary {
        background: #4361ee;
      }
      .btn-primary:hover {
        background: #3a56d4;
      }
      .btn-secondary {
        background: #6c757d;
      }
      .btn-secondary:hover {
        background: #5a6268;
      }
      .btn-warning {
        background: #f4a261;
      }
      .btn-warning:hover {
        background: #e08c4a;
      }
      .btn-top {
        background: #e63946;
      }
      .btn-top:hover {
        background: #cf2f3c;
      }
      .btn-seed {
        background: #2ec4b6;
      }
      .btn-seed:hover {
        background: #25a99d;
      }

      .action-bar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 8px;
      }

      /* Books grid */
      .books-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 16px;
        margin-bottom: 20px;
      }
      .book-card {
        background: #fff;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }
      .book-card h3 {
        color: #4361ee;
        margin-bottom: 6px;
        font-size: 16px;
      }
      .book-card .author {
        color: #777;
        font-size: 13px;
        margin-bottom: 8px;
      }
      .book-card .meta {
        font-size: 13px;
        color: #555;
        line-height: 1.7;
      }
      .book-card .meta span {
        display: inline-block;
        margin-right: 14px;
      }
      .badge {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 600;
        background: #e0e7ff;
        color: #4361ee;
      }
      .star {
        color: #f4a261;
      }

      /* Pagination */
      .pagination {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-top: 10px;
      }
      .pagination .btn {
        min-width: 90px;
        text-align: center;
      }
      .page-info {
        display: flex;
        align-items: center;
        font-size: 14px;
        color: #666;
      }

      .empty-msg {
        text-align: center;
        color: #999;
        padding: 40px 0;
        grid-column: 1 / -1;
      }
      .status-bar {
        font-size: 13px;
        color: #888;
        margin-bottom: 12px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📚 Online Book Finder</h1>

      <div class="controls">
        <!-- Seed -->
        <div class="row">
          <button class="btn btn-seed" onclick="seedBooks()">
            Seed Sample Books
          </button>
          <span style="font-size: 13px; color: #888"
            >(Run once to populate the database with sample data)</span
          >
        </div>

        <!-- Search by title -->
        <h2>Search &amp; Filter</h2>
        <div class="row">
          <input type="text" id="searchTitle" placeholder="Search by title…" />
          <button class="btn btn-primary" onclick="searchByTitle()">
            Search
          </button>
        </div>

        <!-- Filter by category -->
        <div class="row">
          <select id="categorySelect">
            <option value="">-- Filter by Category --</option>
            <option value="Programming">Programming</option>
            <option value="Database">Database</option>
            <option value="Data Science">Data Science</option>
            <option value="Web Design">Web Design</option>
          </select>
          <button class="btn btn-secondary" onclick="filterByCategory()">
            Filter
          </button>
        </div>

        <!-- Sort & Top Rated -->
        <div class="action-bar">
          <button class="btn btn-warning" onclick="sortBooks('price')">
            Sort by Price ↑
          </button>
          <button class="btn btn-warning" onclick="sortBooks('rating')">
            Sort by Rating ↓
          </button>
          <button class="btn btn-top" onclick="topRated()">⭐ Top Rated</button>
          <button class="btn btn-primary" onclick="loadBooks(1)">
            Show All (Paginated)
          </button>
        </div>
      </div>

      <div id="statusBar" class="status-bar"></div>
      <div id="booksGrid" class="books-grid">
        <p class="empty-msg">
          Use the controls above to search or browse books.
        </p>
      </div>

      <!-- Pagination -->
      <div class="pagination" id="paginationBar" style="display: none">
        <button class="btn btn-secondary" id="prevBtn" onclick="prevPage()">
          ← Prev
        </button>
        <span class="page-info" id="pageInfo"></span>
        <button class="btn btn-secondary" id="nextBtn" onclick="nextPage()">
          Next →
        </button>
      </div>
    </div>

    <script>
      const API = "http://localhost:3000";
      let currentPage = 1;
      let totalPages = 1;

      // Render book cards
      function renderBooks(books, status) {
        const grid = document.getElementById("booksGrid");
        document.getElementById("statusBar").textContent = status || "";

        if (!books || books.length === 0) {
          grid.innerHTML = '<p class="empty-msg">No books found.</p>';
          document.getElementById("paginationBar").style.display = "none";
          return;
        }

        grid.innerHTML = books
          .map(
            (b) => `
      <div class="book-card">
        <h3>${esc(b.title)}</h3>
        <div class="author">by ${esc(b.author)}</div>
        <div class="meta">
          <span class="badge">${esc(b.category)}</span><br/>
          <span>₹${b.price}</span>
          <span class="star">★ ${b.rating}</span>
          <span>${b.year}</span>
        </div>
      </div>`,
          )
          .join("");
      }

      // Search by title
      async function searchByTitle() {
        const q = document.getElementById("searchTitle").value.trim();
        if (!q) return alert("Enter a search term");
        hidePagination();
        const res = await fetch(
          `${API}/books/search?title=${encodeURIComponent(q)}`,
        );
        const books = await res.json();
        renderBooks(
          books,
          `Search results for "${q}" — ${books.length} book(s)`,
        );
      }

      // Filter by category
      async function filterByCategory() {
        const cat = document.getElementById("categorySelect").value;
        if (!cat) return alert("Select a category");
        hidePagination();
        const res = await fetch(
          `${API}/books/category/${encodeURIComponent(cat)}`,
        );
        const books = await res.json();
        renderBooks(books, `Category: ${cat} — ${books.length} book(s)`);
      }

      // Sort
      async function sortBooks(field) {
        hidePagination();
        const res = await fetch(`${API}/books/sort/${field}`);
        const books = await res.json();
        const label =
          field === "rating" ? "Rating (high→low)" : "Price (low→high)";
        renderBooks(books, `Sorted by ${label} — ${books.length} book(s)`);
      }

      // Top rated
      async function topRated() {
        hidePagination();
        const res = await fetch(`${API}/books/top`);
        const books = await res.json();
        renderBooks(
          books,
          `Top rated books (rating ≥ 4) — ${books.length} book(s)`,
        );
      }

      // Paginated list
      async function loadBooks(page) {
        currentPage = page;
        const res = await fetch(`${API}/books?page=${page}`);
        const data = await res.json();
        totalPages = data.totalPages;
        renderBooks(
          data.books,
          `All books — Page ${data.page} of ${data.totalPages} (${data.total} total)`,
        );
        showPagination();
      }

      function prevPage() {
        if (currentPage > 1) loadBooks(currentPage - 1);
      }
      function nextPage() {
        if (currentPage < totalPages) loadBooks(currentPage + 1);
      }

      function showPagination() {
        const bar = document.getElementById("paginationBar");
        bar.style.display = "flex";
        document.getElementById("pageInfo").textContent =
          `Page ${currentPage} / ${totalPages}`;
        document.getElementById("prevBtn").disabled = currentPage <= 1;
        document.getElementById("nextBtn").disabled = currentPage >= totalPages;
      }
      function hidePagination() {
        document.getElementById("paginationBar").style.display = "none";
      }

      // Seed sample data
      async function seedBooks() {
        const res = await fetch(`${API}/books/seed`, { method: "POST" });
        const data = await res.json();
        alert(data.message);
        loadBooks(1);
      }

      // Utility
      function esc(str) {
        const d = document.createElement("div");
        d.textContent = str || "";
        return d.innerHTML;
      }
    </script>
  </body>
</html>
